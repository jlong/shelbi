version: 2

project_name: shelbi

builds:
  - id: shelbi
    builder: rust
    binary: shelbi
    command: zigbuild
    flags:
      - --release
      - -p=shelbi
    targets:
      - aarch64-apple-darwin
      - x86_64-apple-darwin
      - x86_64-unknown-linux-gnu

archives:
  - id: shelbi
    ids:
      - shelbi
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "darwin" }}Darwin{{ else if eq .Os "linux" }}Linux{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

nfpms:
  - id: shelbi-deb
    ids:
      - shelbi
    package_name: shelbi
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    vendor: Shelbi
    homepage: https://github.com/jlong/shelbi
    maintainer: John W. Long <john@32pixels.co>
    description: Open-source agent orchestrator built on tmux.
    license: MIT
    section: devel
    priority: optional
    formats:
      - deb
    bindir: /usr/bin
    dependencies:
      - tmux (>= 3.2)
      - git
      - openssh-client
    contents:
      - src: README.md
        dst: /usr/share/doc/shelbi/README.md
      - src: LICENSE
        dst: /usr/share/doc/shelbi/copyright
    overrides:
      deb:
        file_name_template: "{{ .ProjectName }}_{{ .Version }}_amd64"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jlong
    name: shelbi
  draft: false
  prerelease: auto
  header: |
    ## Shelbi {{ .Tag }}

    Release artifacts are published with SHA256 checksums. GitHub artifact
    attestations are generated by the release workflow.

changelog:
  use: github
