name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref_name:
        description: 'Synthetic tag for validation, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      dry_run: ${{ steps.version.outputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: Swatinem/rust-cache@v2

      - name: Validate tag and Cargo version
        env:
          GITHUB_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.ref_name || github.ref_name }}
        run: scripts/release/check-version.sh

      - name: Capture release metadata
        id: version
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.ref_name || github.ref_name }}
          IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shelbi") | .version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "dry_run=$IS_DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config --global user.email "ci@shelbi.local"
          git config --global user.name "shelbi CI"

      - name: Core release tests
        run: cargo test --workspace

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

  smoke:
    name: Smoke ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux only: macOS runners (especially the Intel macos-13 pool)
          # queue for tens of minutes and shouldn't gate releases. The
          # shipped darwin binaries are cross-compiled in the publish job;
          # real-hardware verification happens on the maintainer's mac.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: target/x86_64-unknown-linux-gnu/release/shelbi
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p shelbi --target ${{ matrix.target }}

      - name: Smoke test version
        run: ${{ matrix.binary }} --version

  goreleaser-dry-run:
    name: GoReleaser dry run
    needs:
      - validate
      - smoke
    if: needs.validate.outputs.dry_run == 'true'
    # macos-14: darwin targets need a real macOS SDK for framework linking
    # (zig cross-compilation from Linux fails on -framework CoreFoundation).
    # The Linux target cross-compiles fine from macOS via cargo-zigbuild.
    runs-on: macos-14
    permissions:
      contents: read
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.validate.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build snapshot artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean

      - name: Verify checksums file
        run: test -s dist/checksums.txt

      - name: Verify .deb package exists
        run: test -n "$(find dist -maxdepth 1 -name 'shelbi_*_amd64.deb' -print -quit)"

  release:
    name: Publish GitHub release
    needs:
      - validate
      - smoke
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # macos-14: darwin targets need a real macOS SDK for framework linking
    # (zig cross-compilation from Linux fails on -framework CoreFoundation).
    # The Linux target cross-compiles fine from macOS via cargo-zigbuild.
    runs-on: macos-14
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points at checked out commit
        run: |
          test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" = "$GITHUB_SHA"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean

      - name: Verify checksums file
        run: test -s dist/checksums.txt

      - name: Verify .deb package exists
        run: test -n "$(find dist -maxdepth 1 -name 'shelbi_*_amd64.deb' -print -quit)"

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: dist/checksums.txt

  homebrew-pr:
    name: Open Homebrew tap PR
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.HOMEBREW_TAP_REPOSITORY != ''
    runs-on: ubuntu-latest
    environment: release-downstream
    permissions:
      contents: read
    steps:
      - name: Checkout Shelbi
        uses: actions/checkout@v4
        with:
          path: shelbi

      - name: Download release checksums
        working-directory: shelbi
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --pattern checksums.txt \
            --dir dist

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          ruby shelbi/scripts/release/update-homebrew-formula.rb \
            --tap-dir homebrew-tap \
            --version "$version" \
            --checksums shelbi/dist/checksums.txt \
            --github-repo "$GITHUB_REPOSITORY"

      - name: Open tap update PR
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          branch="shelbi-${version}"
          git config user.name "shelbi-release-bot"
          git config user.email "shelbi-release-bot@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/shelbi.rb
          git commit -m "shelbi ${version}"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --repo "$TAP_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "shelbi ${version}" \
            --body "Updates the Shelbi formula to ${version} after GitHub Release artifacts were published."

  apt-publish:
    name: Publish APT repository
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.APT_REPO != ''
    runs-on: ubuntu-latest
    environment: release-downstream
    permissions:
      contents: read
    env:
      APT_SUITE: stable
    steps:
      - name: Checkout Shelbi
        uses: actions/checkout@v4
        with:
          path: shelbi

      - name: Install APT repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils gnupg gzip ca-certificates

      - name: Download release package
        working-directory: shelbi
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --pattern 'shelbi_*_amd64.deb' \
            --dir dist
          test "$(find dist -maxdepth 1 -name 'shelbi_*_amd64.deb' | wc -l)" -eq 1

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APT_REPO }}
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Import APT signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/apt-gnupg"
          install -d -m 0700 "$GNUPGHOME"
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          shelbi/scripts/release/export-apt-public-key.sh --output apt-repo
          fingerprint=$(cat apt-repo/shelbi-archive-keyring.fingerprint)
          echo "APT_GPG_KEY_ID=$fingerprint" >> "$GITHUB_ENV"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Build signed APT repository
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          deb=$(find shelbi/dist -maxdepth 1 -name 'shelbi_*_amd64.deb' -print -quit)
          shelbi/scripts/release/build-apt-repo.sh \
            --repo-dir apt-repo \
            --deb "$deb" \
            --suite "$APT_SUITE"

      - name: Assert required repository layout
        run: |
          test -d apt-repo/pool/main/s/shelbi
          test -d apt-repo/dists/stable
          test -f apt-repo/dists/stable/main/binary-amd64/Packages
          test -f apt-repo/dists/stable/main/binary-amd64/Packages.gz
          test -f apt-repo/dists/stable/Release
          test -f apt-repo/dists/stable/InRelease
          test -f apt-repo/dists/stable/Release.gpg
          test -f apt-repo/shelbi-archive-keyring.gpg
          test -f apt-repo/shelbi-archive-keyring.fingerprint

      - name: Publish APT repository
        working-directory: apt-repo
        run: |
          git config user.name "shelbi release automation"
          git config user.email "release@shelbi.dev"
          git add shelbi-archive-keyring.gpg shelbi-archive-keyring.fingerprint pool dists
          git diff --cached --quiet && exit 0
          git commit -m "Publish Shelbi ${GITHUB_REF_NAME} to APT"
          git push

  apt-verify-install:
    name: Verify APT install
    needs: apt-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APT_BASE_URL: ${{ vars.APT_BASE_URL || 'https://apt.shelbi.dev' }}
      APT_SUITE: stable
    steps:
      - name: Install Shelbi from hosted APT repository
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL "$APT_BASE_URL/shelbi-archive-keyring.gpg" \
            | sudo tee /etc/apt/keyrings/shelbi-archive-keyring.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/shelbi-archive-keyring.gpg] $APT_BASE_URL $APT_SUITE main" \
            | sudo tee /etc/apt/sources.list.d/shelbi.list >/dev/null

          for attempt in 1 2 3 4 5; do
            if sudo apt-get update; then
              break
            fi
            if [[ "$attempt" == 5 ]]; then
              exit 1
            fi
            sleep 15
          done

          sudo apt-get install -y shelbi
          shelbi --version

  downstream-publication:
    name: Prepare downstream publication
    needs:
      - release
      - homebrew-pr
      - apt-publish
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release-downstream
    permissions:
      contents: read
    steps:
      - name: Downstream release state
        env:
          HOMEBREW_RESULT: ${{ needs.homebrew-pr.result }}
          APT_RESULT: ${{ needs.apt-publish.result }}
        run: |
          cat <<EOF
          GitHub Release artifacts, checksums, .deb package, and attestations are published.

          Downstream publication runs automatically once configured per docs/release.md:
          - Homebrew tap PR (result: $HOMEBREW_RESULT) is gated on
            vars.HOMEBREW_TAP_REPOSITORY and TAP_GITHUB_TOKEN.
          - APT publish (result: $APT_RESULT) is gated on vars.APT_REPO (the shelbi-apt
            hosting repository) plus APT_REPO_TOKEN, APT_GPG_PRIVATE_KEY, and
            APT_GPG_PASSPHRASE.
          EOF
