# Manual backfill/re-publish path. Tag-driven releases publish to APT via the
# apt-publish job in release.yml — a `release: published` trigger would never
# fire there because events created with the workflow GITHUB_TOKEN do not
# start new workflow runs.
name: release-apt

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish into the APT repository
        required: true

permissions:
  contents: read

env:
  APT_REPO: ${{ vars.APT_REPO || format('{0}/shelbi-apt', github.repository_owner) }}
  APT_BASE_URL: ${{ vars.APT_BASE_URL || 'https://apt.shelbi.dev' }}
  APT_SUITE: stable

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Two checkouts: release scripts come from the workflow's own ref
      # (normally main) so they stay in lockstep with this workflow file,
      # while the tag's tree is what the version check inspects. Running the
      # tag's copy of check-version.sh would resurrect whatever bugs it had
      # at tag time.
      - uses: actions/checkout@v4

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          path: tag-src

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tag-src

      - name: Validate release tag
        # The runner overwrites default GITHUB_* variables after env blocks are
        # applied, so GITHUB_REF_NAME cannot be overridden here; the script
        # reads RELEASE_TAG instead.
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        working-directory: tag-src
        run: "$GITHUB_WORKSPACE/scripts/release/check-version.sh"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
    steps:
      # Workflow ref, not the tag: this job only needs the release scripts
      # (the .deb comes from the GitHub release), and they must match what
      # this workflow file expects, not what the tag shipped.
      - uses: actions/checkout@v4

      - name: Install APT repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils gnupg gzip ca-certificates

      - name: Download release package
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'shelbi_*_amd64.deb' \
            --dir dist
          test "$(find dist -maxdepth 1 -name 'shelbi_*_amd64.deb' | wc -l)" -eq 1

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APT_REPO }}
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Import APT signing key
        run: |
          export GNUPGHOME="$RUNNER_TEMP/apt-gnupg"
          install -d -m 0700 "$GNUPGHOME"
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          scripts/release/export-apt-public-key.sh --output apt-repo
          fingerprint=$(cat apt-repo/shelbi-archive-keyring.fingerprint)
          echo "APT_GPG_KEY_ID=$fingerprint" >> "$GITHUB_ENV"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Build signed APT repository
        run: |
          deb=$(find dist -maxdepth 1 -name 'shelbi_*_amd64.deb' -print -quit)
          scripts/release/build-apt-repo.sh \
            --repo-dir apt-repo \
            --deb "$deb" \
            --suite "$APT_SUITE"

      - name: Assert required repository layout
        run: |
          test -d apt-repo/pool/main/s/shelbi
          test -d apt-repo/dists/stable
          test -f apt-repo/dists/stable/main/binary-amd64/Packages
          test -f apt-repo/dists/stable/main/binary-amd64/Packages.gz
          test -f apt-repo/dists/stable/Release
          test -f apt-repo/dists/stable/InRelease
          test -f apt-repo/dists/stable/Release.gpg
          test -f apt-repo/shelbi-archive-keyring.gpg
          test -f apt-repo/shelbi-archive-keyring.fingerprint

      - name: Publish APT repository
        working-directory: apt-repo
        run: |
          git config user.name "shelbi release automation"
          git config user.email "release@shelbi.dev"
          git add shelbi-archive-keyring.gpg shelbi-archive-keyring.fingerprint pool dists
          git diff --cached --quiet && exit 0
          git commit -m "Publish Shelbi ${{ inputs.tag }} to APT"
          git push

  verify-install:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Install Shelbi from hosted APT repository
        run: |
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL "$APT_BASE_URL/shelbi-archive-keyring.gpg" \
            | sudo tee /etc/apt/keyrings/shelbi-archive-keyring.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/shelbi-archive-keyring.gpg] $APT_BASE_URL $APT_SUITE main" \
            | sudo tee /etc/apt/sources.list.d/shelbi.list >/dev/null

          for attempt in 1 2 3 4 5; do
            if sudo apt-get update; then
              break
            fi
            if [[ "$attempt" == 5 ]]; then
              exit 1
            fi
            sleep 15
          done

          sudo apt-get install -y shelbi
          shelbi --version
