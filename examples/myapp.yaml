name: myapp
repo: git@github.com:me/myapp.git
default_branch: main
machines:
  - name: hub
    kind: local
    work_dir: ~/Workspaces/myapp
  - name: m2
    kind: ssh
    host: m2.local
    work_dir: ~/work/myapp
orchestrator:
  # Switch this to `codex` to boot the dashboard orchestrator with Codex.
  # Shelbi launches Codex as the declared command/flags and does not add
  # Claude-specific bootstrap prompt or --append-system-prompt flags.
  runner: claude
agent_runners:
  claude:
    command: claude
    flags: []
  codex:
    command: codex
    flags: []
# Fixed pool of workspace agents. Each owns a stable worktree on its machine:
# `<machine.work_dir>/.shelbi/wt/<workspace-name>`. The orchestrator assigns
# Kanban tasks to workspaces by name; workspaces switch branches between tasks
# with a fresh context each time.
workspaces:
  - { name: alice, machine: hub, runner: claude }
  - { name: bob,   machine: m2,  runner: codex }
  - { name: carol, machine: m2,  runner: claude }
